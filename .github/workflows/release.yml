name: Build Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TAURI_CLI_VERSION: 2.6.2

jobs:
  build-tauri:
    name: Tauri on ${{ matrix.name }}
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          # A universal DMG runs natively on Apple Silicon while preserving Intel Mac support.
          - name: macOS Universal
            platform: macos-latest
            args: --target universal-apple-darwin
            rust_targets: aarch64-apple-darwin x86_64-apple-darwin
            artifact_name: macos-universal
          - name: Linux x64
            platform: ubuntu-22.04
            args: ""
            rust_targets: ""
            artifact_name: linux-x64
          - name: Windows x64
            platform: windows-2022
            args: ""
            rust_targets: ""
            artifact_name: windows-x64

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Install Rust
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          if [ -n "${{ matrix.rust_targets }}" ]; then
            rustup target add ${{ matrix.rust_targets }}
          fi

      - name: Install Tauri CLI
        shell: bash
        run: cargo install tauri-cli --version "${TAURI_CLI_VERSION}" --locked

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libfuse2 \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            librsvg2-dev \
            patchelf \
            wget

      - name: Prepare bundled Windows toolkit
        if: matrix.platform == 'windows-2022'
        shell: pwsh
        timeout-minutes: 45
        run: ./scripts/prepare-windows-toolkit.ps1

      - name: Verify bundled Windows toolkit
        if: matrix.platform == 'windows-2022'
        shell: pwsh
        run: ./scripts/verify-windows-toolkit.ps1

      - name: Build Tauri release
        shell: bash
        env:
          LAUNCHER_RELEASE_TAG: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          LAUNCHER_BUILD_SHA: ${{ github.sha }}
        run: cargo tauri build ${{ matrix.args }}

      - name: Repackage Linux AppImage
        if: matrix.platform == 'ubuntu-22.04'
        shell: bash
        env:
          APPIMAGETOOL_URL: >-
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
        run: |
          shopt -s nullglob
          appimages=(src-tauri/target/release/bundle/appimage/*.AppImage)

          if [ "${#appimages[@]}" -eq 0 ]; then
            echo "No Tauri AppImage found to repackage."
            exit 1
          fi

          app_id="io.github.xander_haj.Z3RLauncher"
          appdir="appimage-work/AppDir"
          desktop_file="packaging/appimage/${app_id}.desktop"
          icon_file="src-tauri/icons/128x128.png"

          rm -rf appimage-work
          mkdir -p appimage-work dist
          cp "${appimages[0]}" appimage-work/tauri.AppImage
          chmod +x appimage-work/tauri.AppImage

          (
            cd appimage-work
            ./tauri.AppImage --appimage-extract
            mv squashfs-root AppDir
          )

          mkdir -p \
            "${appdir}/usr/share/applications" \
            "${appdir}/usr/share/icons/hicolor/128x128/apps"
          find "${appdir}" -maxdepth 1 -name '*.desktop' -exec rm -f {} +
          find "${appdir}/usr/share/applications" -maxdepth 1 -name '*.desktop' -exec rm -f {} +

          install -Dm755 packaging/appimage/AppRun "${appdir}/AppRun"
          install -Dm644 "${desktop_file}" "${appdir}/${app_id}.desktop"
          install -Dm644 "${desktop_file}" \
            "${appdir}/usr/share/applications/${app_id}.desktop"
          install -Dm644 "${icon_file}" "${appdir}/${app_id}.png"
          install -Dm644 "${icon_file}" \
            "${appdir}/usr/share/icons/hicolor/128x128/apps/${app_id}.png"

          webkit_helper_source="/usr/lib/x86_64-linux-gnu/webkit2gtk-4.1"
          webkit_helper_dest="${appdir}/usr/lib/x86_64-linux-gnu/webkit2gtk-4.1"

          if [ ! -d "${webkit_helper_source}" ]; then
            echo "WebKitGTK helper directory not found: ${webkit_helper_source}"
            exit 1
          fi

          rm -rf "${webkit_helper_dest}"
          mkdir -p "$(dirname "${webkit_helper_dest}")"
          cp -a "${webkit_helper_source}" "${webkit_helper_dest}"

          for helper in WebKitNetworkProcess WebKitWebProcess WebKitGPUProcess; do
            if [ ! -x "${webkit_helper_dest}/${helper}" ]; then
              echo "Missing packaged WebKitGTK helper: ${webkit_helper_dest}/${helper}"
              exit 1
            fi
          done

          if [ ! -f "${webkit_helper_dest}/injected-bundle/libwebkit2gtkinjectedbundle.so" ]; then
            echo "Missing packaged WebKitGTK injected bundle."
            exit 1
          fi

          wget -q "${APPIMAGETOOL_URL}" -O appimage-work/appimagetool-x86_64.AppImage
          chmod +x appimage-work/appimagetool-x86_64.AppImage

          (
            cd appimage-work
            ./appimagetool-x86_64.AppImage --appimage-extract
            mv squashfs-root appimagetool-root
          )

          ARCH=x86_64 \
            appimage-work/appimagetool-root/AppRun \
            "${appdir}" \
            dist/Z3R-Launcher-linux-x64.AppImage
          chmod +x dist/Z3R-Launcher-linux-x64.AppImage
          tar -czf dist/Z3R-Launcher-linux-x64.AppImage.tar.gz \
            -C dist Z3R-Launcher-linux-x64.AppImage

      - name: Collect release assets
        shell: bash
        run: |
          mkdir -p dist
          shopt -s nullglob

          copy_first() {
            local pattern="$1"
            local destination="$2"
            local required="$3"
            local matches=( $pattern )

            if [ "${#matches[@]}" -gt 0 ]; then
              cp "${matches[0]}" "${destination}"
              return 0
            fi

            if [ "${required}" = "required" ]; then
              echo "Required release asset not found: ${pattern}"
              exit 1
            fi
          }

          case "${{ matrix.platform }}" in
            ubuntu-22.04)
              if [ ! -f "dist/Z3R-Launcher-linux-x64.AppImage" ]; then
                copy_first "src-tauri/target/release/bundle/appimage/*.AppImage" \
                  "dist/Z3R-Launcher-linux-x64.AppImage" required
              fi
              if [ ! -f "dist/Z3R-Launcher-linux-x64.AppImage.tar.gz" ]; then
                chmod +x "dist/Z3R-Launcher-linux-x64.AppImage"
                tar -czf "dist/Z3R-Launcher-linux-x64.AppImage.tar.gz" \
                  -C dist "Z3R-Launcher-linux-x64.AppImage"
              fi
              copy_first "src-tauri/target/release/bundle/deb/*.deb" \
                "dist/Z3R-Launcher-linux-x64.deb" optional
              copy_first "src-tauri/target/release/bundle/rpm/*.rpm" \
                "dist/Z3R-Launcher-linux-x64.rpm" optional
              ;;
            macos-latest)
              copy_first "src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg" \
                "dist/Z3R-Launcher-macos-universal.dmg" required
              copy_first "src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz" \
                "dist/Z3R-Launcher-macos-universal.app.tar.gz" optional
              copy_first "src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz.sig" \
                "dist/Z3R-Launcher-macos-universal.app.tar.gz.sig" optional
              ;;
            windows-2022)
              copy_first "src-tauri/target/release/z3r-launcher.exe" \
                "dist/Z3R-Launcher-windows-x64.exe" required
              copy_first "src-tauri/target/release/bundle/msi/*.msi" \
                "dist/Z3R-Launcher-windows-x64.msi" optional
              copy_first "src-tauri/target/release/bundle/nsis/*.exe" \
                "dist/Z3R-Launcher-windows-x64-setup.exe" required
              ;;
          esac

          printf 'Release assets to upload:\n'
          find dist -maxdepth 1 -type f -print | sort

      - name: Upload Tauri artifact
        uses: actions/upload-artifact@v6
        with:
          name: Z3R-Launcher-${{ matrix.artifact_name }}
          path: dist/*
          if-no-files-found: error

      - name: Upload Tauri release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        with:
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
          name: Z3R Launcher ${{ github.ref_name }}
          body: Download the launcher for your operating system below.
          draft: true
          generate_release_notes: true
          files: dist/*

  build-flatpak:
    name: Flatpak for Linux
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-48
      options: --privileged
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Stamp Flatpak release metadata
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path

          manifest = Path("packaging/flatpak/io.github.xander_haj.Z3RLauncher.yml")
          build_command = "cargo build --release --locked --manifest-path src-tauri/Cargo.toml"
          release_tag = os.environ["GITHUB_REF_NAME"]
          release_sha = os.environ["GITHUB_SHA"]
          stamped = (
              f'LAUNCHER_RELEASE_TAG="{release_tag}" '
              f'LAUNCHER_BUILD_SHA="{release_sha}" '
              f"{build_command}"
          )
          text = manifest.read_text()

          if build_command not in text:
              raise SystemExit("Flatpak cargo build command was not found in the manifest.")

          manifest.write_text(text.replace(build_command, stamped, 1))
          PY

      - name: Build and upload Flatpak bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: Z3R-Launcher-linux.flatpak
          manifest-path: packaging/flatpak/io.github.xander_haj.Z3RLauncher.yml
          branch: stable
          cache-key: flatpak-builder-${{ github.sha }}
          upload-artifact: true

      - name: Upload Flatpak release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        with:
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
          name: Z3R Launcher ${{ github.ref_name }}
          body: Download the launcher for your operating system below.
          draft: true
          generate_release_notes: true
          files: Z3R-Launcher-linux.flatpak
